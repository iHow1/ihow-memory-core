<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>iHow Memory Pilot Console</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #667085;
      --line: #d9dee7;
      --accent: #b7791f;
      --ok: #15803d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    header {
      padding: 20px 28px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    h1 { margin: 0; font-size: 20px; font-weight: 650; }
    .sub { margin-top: 4px; color: var(--muted); font-size: 12px; }
    main { padding: 24px 28px; display: grid; gap: 16px; grid-template-columns: 320px 1fr; }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    h2 { margin: 0 0 12px; font-size: 14px; }
    dl { margin: 0; display: grid; gap: 10px; }
    dt { color: var(--muted); font-size: 12px; }
    dd { margin: 2px 0 0; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: #ecfdf3;
      color: var(--ok);
      font-size: 12px;
      font-weight: 600;
    }
    pre {
      margin: 0;
      min-height: 320px;
      max-height: 62vh;
      overflow: auto;
      white-space: pre-wrap;
      color: #344054;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
    }
    @media (max-width: 800px) { main { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <h1>iHow Memory Pilot Console</h1>
    <div class="sub">Local handoff conformance pilot</div>
  </header>
  <main>
    <section>
      <h2>Runtime</h2>
      <dl>
        <div>
          <dt>Status</dt>
          <dd><span class="pill">local</span></dd>
        </div>
        <div>
          <dt>Truth source</dt>
          <dd>/data/ihow-memory</dd>
        </div>
        <div>
          <dt>Host mount</dt>
          <dd>./memory</dd>
        </div>
        <div>
          <dt>Network</dt>
          <dd>internal docker network</dd>
        </div>
      </dl>
    </section>
    <section>
      <h2>Recent Snapshot</h2>
      <pre id="snapshot">Loading memory/recent/latest.md ...</pre>
    </section>
  </main>
  <script>
    fetch("./memory/recent/latest.md", { cache: "no-store" })
      .then((res) => res.ok ? res.text() : Promise.reject(new Error("No snapshot yet")))
      .then((text) => { document.getElementById("snapshot").textContent = text; })
      .catch(() => {
        document.getElementById("snapshot").textContent =
          "No recent snapshot found. The mounted ./memory directory is ready for local-only pilot data.";
      });
  </script>
</body>
</html>
