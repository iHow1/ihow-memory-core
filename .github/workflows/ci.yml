name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Build
        run: npm run build
      - name: CLI smoke
        run: node bin/ihow-memory.mjs --version
      - name: Tests
        run: |
          if [ -d tests ]; then npm test; else echo "no tests/ yet"; fi
      - name: Governed-loop proof
        run: node scripts/proof.mjs
      - name: Pack check
        run: npm pack --dry-run --ignore-scripts

  windows-test:
    runs-on: windows-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Build
        run: npm run build
      - name: Version smoke (guards packageDir Windows path bug)
        shell: pwsh
        run: |
          $v = node bin/ihow-memory.mjs --version
          Write-Host "version: $v"
          if ("$v" -match 'unknown' -or -not ("$v" -match '\d')) {
            Write-Error "packageDir resolution broken on Windows: --version = $v"
            exit 1
          }
      - name: Connect smoke (exercises installRuntimeBundle -> packageDir)
        run: node bin/ihow-memory.mjs connect --runtime claude-code
      - name: Tests
        run: npm test

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for credentials and private content
        # Patterns: common credential shapes plus internal/customer markers that
        # must never appear in this public repository.
        run: |
          set -e
          PATTERNS='ghp_[A-Za-z0-9]{20,}|sk-[A-Za-z0-9]{20,}|AKIA[A-Z0-9]{16}|BEGIN[ A-Z]+PRIVATE KEY|yuntian|/Users/[a-z]+/'
          HITS=$(grep -rnE "$PATTERNS" --include='*' . \
            --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=dist \
            --exclude=ci.yml --exclude=release.yml || true)
          if [ -n "$HITS" ]; then
            echo "Secret scan failed:"
            echo "$HITS"
            exit 1
          fi
          echo "secret scan clean"
          # No machine-local backup / agent config may ever be tracked in this public repo
          # (a .claude/settings.local.json.ihow-bak-* reached history this way once).
          FORBIDDEN=$(git ls-files | grep -E '(^|/)\.claude/|\.ihow-bak-' || true)
          if [ -n "$FORBIDDEN" ]; then
            echo "Forbidden tracked paths (machine-local backup / .claude):"
            echo "$FORBIDDEN"
            exit 1
          fi
          echo "path scan clean"
