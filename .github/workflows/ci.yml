name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Build
        run: npm run build
      - name: CLI smoke
        run: node bin/ihow-memory.mjs --version
      - name: Tests
        run: |
          if [ -d tests ]; then npm test; else echo "no tests/ yet"; fi
      - name: Governed-loop proof
        run: node scripts/proof.mjs
      - name: Pack check
        run: npm pack --dry-run --ignore-scripts

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for credentials and private content
        # Patterns: common credential shapes plus internal/customer markers that
        # must never appear in this public repository.
        run: |
          set -e
          PATTERNS='ghp_[A-Za-z0-9]{20,}|sk-[A-Za-z0-9]{20,}|AKIA[A-Z0-9]{16}|BEGIN[ A-Z]+PRIVATE KEY|yuntian|/Users/[a-z]+/'
          HITS=$(grep -rnE "$PATTERNS" --include='*' . \
            --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=dist \
            --exclude=ci.yml || true)
          if [ -n "$HITS" ]; then
            echo "Secret scan failed:"
            echo "$HITS"
            exit 1
          fi
          echo "secret scan clean"
